# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check

[graph]
targets = []
all-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
# No advisories are currently ignored. If a new transitive advisory must be
# temporarily accepted, add its RUSTSEC ID here AND document the rationale in
# docs/advisories/accepted.md so the gate and docs stay in sync.
ignore = []

[licenses]
# GhostPad is MIT-licensed; we allow MIT-compatible permissive dependency licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Deny specific crates
deny = []

# Skip duplicate version checks for specific crates as needed.
skip = []

skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
